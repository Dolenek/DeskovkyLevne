worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  limit_req_zone $binary_remote_addr zone=tlamasite_api_per_client:10m rate=10r/s;

  set_real_ip_from 127.0.0.1;
  set_real_ip_from ::1;
  real_ip_header CF-Connecting-IP;
  real_ip_recursive on;

  server {
    listen 127.0.0.1:8081;
    server_name www.deskovkylevne.com deskovkylevne.com;
    root /srv/tlamasite/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https:; connect-src 'self'; font-src 'self'; form-action 'self'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location /api/ {
      limit_req zone=tlamasite_api_per_client burst=30 nodelay;
      limit_req_status 429;
      proxy_pass http://127.0.0.1:18080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header CF-Connecting-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|webp|svg|ico|woff|woff2)$ {
      expires 7d;
      try_files $uri =404;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
