services:
  api-go:
    build:
      context: ../../apps/api-go
      dockerfile: Dockerfile
      args:
        API_VERSION: "${API_VERSION:-development}"
        API_COMMIT: "${API_COMMIT:-unknown}"
        API_BUILT_AT: "${API_BUILT_AT:-unknown}"
    container_name: tlamasite-api-go
    restart: unless-stopped
    mem_limit: "${API_GO_MEMORY_LIMIT:-768m}"
    ports:
      - "127.0.0.1:${API_GO_PORT:-18080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GOMEMLIMIT: "${GOMEMLIMIT:-384MiB}"
      GOGC: "${GOGC:-50}"
      API_ADDRESS: ":8080"
      DATABASE_URL: "${DATABASE_URL}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}"
      API_DATABASE_ROLE: "${API_DATABASE_ROLE:-tlamasite_api}"
      API_TRUSTED_PROXY_CIDRS: "${API_TRUSTED_PROXY_CIDRS:-}"
      API_READ_HEADER_TIMEOUT: "${API_READ_HEADER_TIMEOUT:-5s}"
      API_MAX_HEADER_BYTES: "${API_MAX_HEADER_BYTES:-32768}"
      API_DB_MAX_CONNS: "${API_DB_MAX_CONNS:-10}"
      API_DB_MIN_CONNS: "${API_DB_MIN_CONNS:-1}"
      API_DB_MAX_CONN_IDLE: "${API_DB_MAX_CONN_IDLE:-5m}"
      API_DB_MAX_CONN_LIFETIME: "${API_DB_MAX_CONN_LIFETIME:-2h}"
      API_DB_SIMPLE_PROTOCOL: "${API_DB_SIMPLE_PROTOCOL:-true}"
      API_TIMEOUT_HEALTH: "${API_TIMEOUT_HEALTH:-2s}"
      API_TIMEOUT_READY: "${API_TIMEOUT_READY:-2s}"
      API_TIMEOUT_CATALOG: "${API_TIMEOUT_CATALOG:-6s}"
      API_TIMEOUT_SEARCH: "${API_TIMEOUT_SEARCH:-3s}"
      API_TIMEOUT_PRODUCT: "${API_TIMEOUT_PRODUCT:-6s}"
      API_TIMEOUT_DISCOUNTS: "${API_TIMEOUT_DISCOUNTS:-4s}"
      API_TIMEOUT_METADATA: "${API_TIMEOUT_METADATA:-4s}"
      API_TIMEOUT_PRICE_RANGE: "${API_TIMEOUT_PRICE_RANGE:-4s}"
      API_CACHE_NAMESPACE: "${API_CACHE_NAMESPACE:-api-v2}"
      API_CACHE_TTL_CATALOG: "${API_CACHE_TTL_CATALOG:-120s}"
      API_CACHE_TTL_SEARCH: "${API_CACHE_TTL_SEARCH:-60s}"
      API_CACHE_TTL_PRODUCT: "${API_CACHE_TTL_PRODUCT:-300s}"
      API_CACHE_TTL_DISCOUNTS: "${API_CACHE_TTL_DISCOUNTS:-60s}"
      API_CACHE_TTL_PRICE_RANGE: "${API_CACHE_TTL_PRICE_RANGE:-180s}"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_DB: "0"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--output-document=-", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: tlamasite-redis
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - redis-data:/data

volumes:
  redis-data:
